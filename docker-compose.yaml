services:
  kestra_postgres:
    image: postgres:18
    volumes:
      - kestra_postgres_data:/var/lib/postgresql
    container_name: kestra_postgres
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4_proj
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5

  kestra:
    image: kestra/kestra:v1.1
    container_name: kestra_server
    pull_policy: always
    # Note that this setup with a root user is intended for development purpose.
    # Our base image runs without root, but the Docker Compose implementation needs root to access the Docker socket
    user: "root"
    command: server standalone
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
      - ./02_kestra_pipeline/flows:/app/flows
    environment:
      KESTRA_VARIABLES_ENV_VARS_PREFIX: ""
      # Manually pass through the variables from your local shell to the container
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_DATASET: ${GCP_DATASET}
      GCP_LOCATION: ${GCP_LOCATION}
      GCP_BUCKET_NAME: ${GCP_BUCKET_NAME}
      SECRET_GCP_CREDS: ${SECRET_GCP_CREDS}
      SECRET_KAGGLE_USERNAME: ${SECRET_KAGGLE_USERNAME}
      SECRET_KAGGLE_KEY: ${SECRET_KAGGLE_KEY}

      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4_proj
        kestra:
          server:
            basicAuth:
              username: "admin@kestra.io"
              password: Admin1234
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          configuration:
            path: "/app/flows"
          url: http://localhost:8080/
    env_file:
      - .env # load environment variables from .env file
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      kestra_postgres:
        condition: service_healthy
      dbt:
        condition: service_started

  dbt:
    build: .
    container_name: dbt_worker
    restart: unless-stopped
    volumes:
      - ./03_dbt_project:/usr/app
      - ${LOCAL_GCP_CREDS_PATH}:/root/.gcp/service_account.json
    working_dir: /usr/app
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_DATASET=${GCP_DATASET}
      - GCP_LOCATION=${GCP_LOCATION}
      - DBT_PROFILES_DIR=/usr/app
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  kestra_postgres_data:
    driver: local
  kestra_data:
    driver: local
  dbt:
    driver: local
